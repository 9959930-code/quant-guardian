name: Build and Deploy Quant Guardian

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    # 07:30 KST on the next Korean morning after each regular US trading day.
    - cron: "30 22 * * 1-5"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Build dashboard
        run: python launch_dashboard.py --refresh --no-open

      - name: Prepare static site
        run: |
          mkdir -p public
          cp output/dashboard.html public/index.html
          cp output/report.html public/report.html
          cp output/report.md public/report.md
          cp output/daily.json public/daily.json
          cp output/manifest.webmanifest public/manifest.webmanifest
          cp output/service-worker.js public/service-worker.js
          cp output/icon.svg public/icon.svg
          cp output/*.csv public/
          touch public/.nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

      - name: Notify Telegram
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          QUANT_GUARDIAN_URL: ${{ steps.deployment.outputs.page_url }}
        run: >
          python telegram_notify.py
          --data-url "${{ steps.deployment.outputs.page_url }}daily.json?v=${{ github.sha }}"
          --site-url "${{ steps.deployment.outputs.page_url }}"
          --soft-fail
