[settings]
data_source = "yahoo"
cache_dir = "data/cache"
output_dir = "output"
base_currency = "USD"

[etf_strategy]
name = "ETF Core Momentum"
risk_assets = ["SPY", "QQQ", "TLT", "GLD"]
safety_asset = "SHY"
lookback_months = 12
start_date = "2007-01-01"

[market_regime]
growth_asset = "QQQ"
market_asset = "SPY"
safety_asset = "SHY"
vix_symbol = "^VIX"
risk_on_vix = 20

[qg_core]
name = "QG-Core Aggressive Growth Momentum"
offensive_etfs = ["QQQ", "SPYG", "XLK", "SMH"]
backtest_offensive_etfs = ["QQQ", "SPYG", "XLK", "SMH"]
live_safety_asset = "SGOV"
backtest_safety_asset = "SHY"
gold_asset = "GLD"
bond_asset = "TLT"
stock_max_positions = 5
stock_min_score = 75
max_single_stock_weight = 0.06
sector_cap = 0.40
backtest_start_date = "2016-01-01"

[qg_core_execution_map]
QQQ = "QQQM"

[qg_core_allocations.aggressive]
